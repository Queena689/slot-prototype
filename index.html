<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG Slot Spec Tool - All-in-One Prototyper</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="scenarios.js"></script>
    <style>
        :root { --primary: #00f2fe; --accent: #ff00ff; --gold: #ffd700; --dark: #0a0a0a; }
        body { margin: 0; background: var(--dark); color: white; font-family: monospace; display: flex; height: 100vh; overflow: hidden; }
        
        #controls { width: 350px; background: #151515; padding: 20px; border-right: 1px solid #333; display: flex; flex-direction: column; gap: 15px; z-index: 100; overflow-y: auto; }
        .group { display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        textarea, input, select { background: #222; border: 1px solid #444; color: var(--primary); padding: 8px; border-radius: 6px; font-size: 12px; }
        
        #stage { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #222 0%, #000 100%); }
        .slot-machine { 
            width: 480px; height: 320px; 
            background-size: cover; background-position: center;
            display: grid; gap: 4px; padding: 10px; position: relative; border: 1px dashed #444;
        }
        .reel { position: relative; overflow: visible; display: flex; flex-direction: column; align-items: center; }
        .symbol { width: 100%; height: 70px; background: rgba(255,255,255,0.05); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 9px; color: rgba(255,255,255,0.2); pointer-events: none; }
        
        button { background: var(--primary); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button.script-btn { background: var(--accent); color: white; }
        button:hover { filter: brightness(1.2); transform: scale(1.02); }

        /* 特效 CSS */
        .multiplier-frame { position: absolute; width: 70px; height: 70px; border: 4px solid var(--accent); border-radius: 50%; box-shadow: 0 0 15px var(--accent); z-index: 500; display: flex; align-items: center; justify-content: center; }
        .mult-tag { background: var(--accent); color: white; padding: 2px 8px; border-radius: 4px; font-size: 14px; font-weight: bold; transform: translateY(-42px); }
        .lightning-bolt { position: absolute; font-size: 24px; z-index: 1000; text-shadow: 0 0 10px var(--primary); }
    </style>
</head>
<body>
    <div id="controls">
        <h2 style="color:var(--primary); font-size:18px; margin:0;">ULTIMATE PROTOTYPER</h2>
        
        <div class="group">
            <label>1. 背景設定</label>
            <input type="file" accept="image/*" onchange="handleImageUpload(this)">
        </div>

        <div class="group">
            <label>2. 快速選項 (預設情境)</label>
            <select id="spec-mode" onchange="initMachine()">
                <option value="lightning">閃電累加 (image_b08d75)</option>
                <option value="expand">Nudge 中心擴展 (5格)</option>
                <option value="sticky">常駐累積框</option>
            </select>
            <button onclick="runDefaultDemo()">執行快速演示</button>
        </div>

        <div class="group">
            <label>3. 盤面尺寸 (Reels x Rows)</label>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                <input type="number" id="reels" value="5" onchange="initMachine()">
                <input type="number" id="rows" value="3" onchange="initMachine()">
            </div>
        </div>

        <div class="group">
            <label>4. 自定義腳本</label>
            <textarea id="custom-script" rows="6">Scenarios.throwLightning('s-3-0', 2);</textarea>
            <button class="script-btn" onclick="runCustomScript()">運行腳本表演</button>
        </div>

        <button style="background:#444; color:white;" onclick="location.reload()">全域重置</button>
    </div>

    <div id="stage">
        <div class="slot-machine" id="machine"></div>
    </div>

    <script>
        function handleImageUpload(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => { document.getElementById('machine').style.backgroundImage = `url('${e.target.result}')`; };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function initMachine() {
            const m = document.getElementById('machine');
            const reels = document.getElementById('reels').value;
            const rows = document.getElementById('rows').value;
            m.style.gridTemplateColumns = `repeat(${reels}, 1fr)`;
            m.innerHTML = '';
            for(let i=0; i<reels; i++) {
                const r = document.createElement('div');
                r.className = 'reel'; r.id = `reel-${i}`;
                for(let j=0; j<rows; j++) {
                    const s = document.createElement('div');
                    s.className = 'symbol'; s.id = `s-${i}-${j}`;
                    s.innerText = `[${i},${j}]`;
                    r.appendChild(s);
                }
                m.appendChild(r);
            }
        }

        async function runDefaultDemo() {
            const mode = document.getElementById('spec-mode').value;
            if (mode === 'lightning') await Scenarios.throwLightning('s-3-0', 2);
            else if (mode === 'expand') await Scenarios.nudgeExpand('s-2-1');
            else if (mode === 'sticky') await Scenarios.stickyCollect('s-1-1', 'machine', 's-4-2', false);
        }

        async function runCustomScript() {
            const scriptStr = document.getElementById('custom-script').value;
            const AsyncFunction = Object.getPrototypeOf(async function(){}).constructor;
            const fn = new AsyncFunction('Scenarios', scriptStr);
            await fn(Scenarios);
        }

        window.onload = initMachine;
    </script>
</body>
</html>
