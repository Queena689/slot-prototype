<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG Slot Spec Prototyper</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --primary: #00f2fe; --accent: #ff00ff; --dark: #121212; }
        body { margin: 0; background: var(--dark); color: white; font-family: system-ui, -apple-system, sans-serif; display: flex; height: 100vh; }
        
        #controls { width: 320px; background: #1a1a1a; padding: 25px; border-right: 1px solid #333; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        .group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        select, input { background: #2a2a2a; border: 1px solid #444; color: white; padding: 10px; border-radius: 6px; font-size: 14px; }
        
        #stage { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; background: radial-gradient(circle, #222 0%, #000 100%); }
        .slot-machine { display: flex; gap: 10px; background: #222; padding: 15px; border-radius: 12px; border: 4px solid #333; position: relative; }
        .reel { width: 85px; background: #000; border-radius: 6px; display: flex; flex-direction: column; align-items: center; position: relative; overflow: visible; }
        .symbol { width: 75px; height: 75px; margin: 8px 0; background: #1a1a1a; border-radius: 6px; flex-shrink: 0; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #444; font-size: 12px; }
        
        /* 特效元件 */
        .sticky-frame { position: absolute; width: 75px; height: 75px; border: 3px solid var(--primary); border-radius: 8px; box-shadow: 0 0 15px var(--primary); z-index: 10; background: rgba(0, 242, 254, 0.1); transform: scale(0); pointer-events: none; }
        .mult-tag { position: absolute; top: -12px; right: -12px; background: var(--accent); color: white; padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .particle { position: absolute; width: 20px; height: 20px; background: var(--accent); border-radius: 50%; z-index: 99; box-shadow: 0 0 15px var(--accent); display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; }

        button.main-btn { background: var(--primary); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button.main-btn:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

    <div id="controls">
        <h2 style="margin:0; color:var(--primary)">MG Spec Tool</h2>
        <div class="group">
            <label>1. 選擇規格情境</label>
            <select id="spec-mode">
                <option value="sticky">常駐累積 (Sticky Frames)</option>
                <option value="multiplier">乘倍發射 (Value Launch)</option>
                <option value="nudge">單顆 Nudge 表演</option>
            </select>
        </div>
        <div class="group">
            <label>2. 調整盤面</label>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <input type="number" id="reels" value="5" onchange="initMachine()">
                <input type="number" id="rows" value="4" onchange="initMachine()">
            </div>
        </div>
        <button class="main-btn" onclick="runDemo()">執行演示表演</button>
        <hr style="border:0; border-top:1px solid #333; width:100%">
        <p style="font-size:12px; color:#666">製作人筆記：此工具用於快速驗證 R&D 表演節奏。修改 Reels/Rows 後會自動重置盤面。</p>
    </div>

    <div id="stage">
        <div class="slot-machine" id="machine"></div>
    </div>

    <script>
        function initMachine() {
            const m = document.getElementById('machine');
            const reelCount = parseInt(document.getElementById('reels').value);
            const rowCount = parseInt(document.getElementById('rows').value);
            m.innerHTML = '';
            for(let i=0; i<reelCount; i++) {
                const r = document.createElement('div');
                r.className = 'reel';
                r.id = `reel-${i}`;
                for(let j=0; j<rowCount; j++) {
                    const s = document.createElement('div');
                    s.className = 'symbol';
                    s.id = `s-${i}-${j}`;
                    s.innerText = (i === reelCount - 1) ? "COLLECT" : "SYM";
                    r.appendChild(s);
                }
                m.appendChild(r);
            }
        }

        async function runDemo() {
            const mode = document.getElementById('spec-mode').value;
            const reelCount = parseInt(document.getElementById('reels').value);
            const rowCount = parseInt(document.getElementById('rows').value);
            
            // 隨機選一個目標 (1 ~ Reel-1)
            const targetReel = Math.floor(Math.random() * (reelCount - 1));
            const targetRow = Math.floor(Math.random() * rowCount);
            const targetId = `s-${targetReel}-${targetRow}`;
            const targetSym = document.getElementById(targetId);
            const machine = document.getElementById('machine');
            const source = document.getElementById(`s-${reelCount-1}-${rowCount-1}`); // 最後一顆當發射源

            if (mode === 'sticky' || mode === 'multiplier') {
                // 執行發射邏輯
                const mRect = machine.getBoundingClientRect();
                const tRect = targetSym.getBoundingClientRect();
                const sRect = source.getBoundingClientRect();

                // 建立框框
                const frame = document.createElement('div');
                frame.className = 'sticky-frame';
                frame.style.left = (tRect.left - mRect.left) + 'px';
                frame.style.top = (tRect.top - mRect.top) + 'px';
                if(mode === 'multiplier') frame.innerHTML = `<div class="mult-tag">X5</div>`;
                machine.appendChild(frame);

                // 建立飛行粒子
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = (sRect.left - mRect.left + 30) + 'px';
                p.style.top = (sRect.top - mRect.top + 30) + 'px';
                if(mode === 'multiplier') p.innerText = "X5";
                machine.appendChild(p);

                const tl = gsap.timeline();
                tl.to(source, { scale: 0.8, duration: 0.1, yoyo: true, repeat: 1 });
                await tl.to(p, {
                    left: (tRect.left - mRect.left + 30),
                    top: (tRect.top - mRect.top + 30),
                    duration: 0.6,
                    ease: "back.out(1.2)"
                });
                p.remove();
                gsap.to(frame, { scale: 1, opacity: 1, duration: 0.4, ease: "elastic.out(1, 0.7)" });

            } else if (mode === 'nudge') {
                const reel = document.getElementById(`reel-${targetReel}`);
                // 模擬 Nudge 震動與逐格感
                const tl = gsap.timeline();
                tl.to(reel, { y: 10, duration: 0.1, yoyo: true, repeat: 3 });
                tl.to(targetSym, { backgroundColor: "#333", duration: 0.2 });
                tl.to(targetSym, { scale: 1.1, border: "2px solid var(--primary)", duration: 0.3, ease: "back.out(2)" });
            }
        }

        window.onload = initMachine;
    </script>
</body>
</html>
